name: Basic Julia Test
on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: julia-actions/setup-julia@v1
        with:
          version: '1.6'
      - run: julia -e 'println("Julia version: ", VERSION)'